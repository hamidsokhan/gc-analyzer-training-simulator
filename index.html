<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GC Analyzer Training Simulator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      text-align: center;
    }
    .menu {
      padding: 40px;
    }
    .btn {
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }
    #app {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="menu">
    <h1>GC Analyzer Training Simulator</h1>
    <p>Select Training Mode</p>

    <button class="btn" onclick="loadLevel4()">Level 4 — Fault Diagnosis</button>
    <button class="btn" onclick="loadLevel5()">Level 5 — Chromatogram Diagnosis</button>
  </div>

  <div id="app"></div>

  <script>
    function removeOldScripts() {
      document.querySelectorAll('script[data-sim]').forEach(s => s.remove());
    }

    function clearApp() {
      document.getElementById("app").innerHTML = "";
      removeOldScripts();
    }

    function loadLevel4() {
      clearApp();
      const div = document.createElement("div");
      div.id = "level4-app";
      document.getElementById("app").appendChild(div);

      const script = document.createElement("script");
      script.src = "level4.js";
      script.setAttribute("data-sim", "level4");
      document.body.appendChild(script);
    }

    function loadLevel5() {
      clearApp();
      const div = document.createElement("div");
      div.id = "level5-app";
      document.getElementById("app").appendChild(div);

      const script = document.createElement("script");
      script.src = "level5.js";
      script.setAttribute("data-sim", "level5");
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
